[toolchain]
anchor_version = "0.30.1"
solana_version = "1.18.26"

[features]
resolution = true
skip-lint = false

[programs.localnet]
identity_registry = "11111111111111111111111111111111"
reputation_registry = "11111111111111111111111111111111"
validation_registry = "11111111111111111111111111111111"
agent_verifier = "11111111111111111111111111111111"

[programs.devnet]
identity_registry = "11111111111111111111111111111111"
reputation_registry = "11111111111111111111111111111111"
validation_registry = "11111111111111111111111111111111"
agent_verifier = "11111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "pnpm exec ts-mocha -p ./tsconfig.anchor.json -t 1000000 tests/anchor/**/*.ts"

# After installing anchor + solana, run:
#   anchor keys sync
# to replace the placeholder program IDs above with real ones.
